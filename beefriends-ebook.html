    <link rel="shortcut icon" href="assets/favicon.png" type="image/png" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #book-viewer { width: 100%; }
      /* page-flip injects its own canvas; wrap it */
      #book-mount { display: flex; justify-content: center; }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow-sm fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <img src="assets/logo_nobg.png" alt="BeeWise Logo" class="nav-logo2" />
          <span>BeeWise</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navmenu">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="beecure.html">BeeCure</a></li>
            <li class="nav-item"><a class="nav-link active" href="beefriends.html">BeeFriends</a></li>
            <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
              <button id="langToggle" class="btn btn-lang d-inline-flex align-items-center gap-2">
                한국어 <span class="lang-pill">EN</span>
              </button>
            </li>
            <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
              <a class="btn btn-bee3" href="beefriends.html#contact">Get Started</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Sub-nav -->
    <div class="bf-page-wrap">
      <nav class="bf-subnav">
        <div class="container d-flex align-items-center gap-2 flex-wrap">
          <a href="beefriends.html" class="bf-back"><i class="bi bi-arrow-left me-1"></i>BeeFriends</a>
          <span class="text-muted mx-1" style="opacity:.35">|</span>
          <a href="beefriends-ebook.html" class="nav-link bf-active" data-kor="subnav.ebook">E-Book</a>
          <a href="beefriends-game.html" class="nav-link" data-kor="subnav.game">Game</a>
          <a href="beefriends-counting.html" class="nav-link" data-kor="subnav.counter">Mite Counter</a>
        </div>
      </nav>

      <!-- E-Book viewer -->
      <section class="ebook-section">

        <!-- Loading state -->
        <div id="loader" class="ebook-loader">
          <p style="font-size:1.1rem;font-weight:600;margin-bottom:.5rem" data-kor="ebook.loading">Loading e-book…</p>
          <p id="loader-detail" style="font-size:.9rem;opacity:.65;margin-bottom:1.2rem">Rendering pages, please wait.</p>
          <div class="ebook-progress-wrap">
            <div id="progress-bar" class="ebook-progress-bar"></div>
          </div>
          <p id="error-msg" style="display:none;color:#f87171;margin-top:1.5rem;font-size:.95rem"></p>
        </div>

        <!-- Book viewer (shown after load) -->
        <div id="book-viewer">
          <div id="book-mount"></div>

          <div class="book-controls">
            <button id="prev-btn" class="btn-flip" disabled>
              <i class="bi bi-chevron-left me-1"></i><span data-kor="ebook.prev">Previous</span>
            </button>
            <span id="page-info" class="page-info">— / —</span>
            <button id="next-btn" class="btn-flip" disabled>
              <span data-kor="ebook.next">Next</span><i class="bi bi-chevron-right ms-1"></i>
            </button>
          </div>
          <p class="text-center mt-2" style="color:rgba(255,255,255,.45);font-size:.82rem">
            <span data-kor="ebook.hint">Click the edge of a page to flip · Swipe on mobile</span>
            &nbsp;<span id="bg-progress" style="opacity:.5"></span>
          </p>
        </div>

      </section>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4" style="background:linear-gradient(90deg,var(--bee-yellow),var(--bee-orange)); color:#fff;">
      <small>&copy; 2025 BeeWise · Innovation in Every Hive</small>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    </script>

    <!-- StPageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

    <script>
    // ── Config ───────────────────────────────────────────────────────────
    const PDF_FILE     = 'beefriends-ebook.pdf';
    const RENDER_SCALE = 1.6;
    const JPEG_QUALITY = 0.82;
    const PRELOAD_PAGES = 4;   // pages rendered before showing the book

    // ── Init ─────────────────────────────────────────────────────────────
    async function initEbook() {
      const loader      = document.getElementById('loader');
      const loaderDetail= document.getElementById('loader-detail');
      const progressBar = document.getElementById('progress-bar');
      const errorMsg    = document.getElementById('error-msg');
      const viewer      = document.getElementById('book-viewer');
      const mount       = document.getElementById('book-mount');
      const prevBtn     = document.getElementById('prev-btn');
      const nextBtn     = document.getElementById('next-btn');
      const pageInfo    = document.getElementById('page-info');
      const bgProgress  = document.getElementById('bg-progress');

      try {
        loaderDetail.textContent = 'Fetching document…';
        const pdf   = await pdfjsLib.getDocument(PDF_FILE).promise;
        const total = pdf.numPages;

        // Dimensions from page 1
        const first  = await pdf.getPage(1);
        const baseVp = first.getViewport({ scale: 1 });
        const ratio  = baseVp.height / baseVp.width;

        const isMobile = window.innerWidth < 768;
        const maxW     = window.innerWidth - 48;   // use full viewport; no artificial cap
        const pageW    = Math.round(isMobile ? maxW : maxW / 2);
        const pageH    = Math.round(pageW * ratio);
        const scale    = (pageW / baseVp.width) * RENDER_SCALE;

        // ── Helper: render one PDF page → img element ────────────────────
        const renderToImg = async (pageNum) => {
          const page = await pdf.getPage(pageNum);
          const vp   = page.getViewport({ scale });
          const cvs  = document.createElement('canvas');
          cvs.width  = vp.width;
          cvs.height = vp.height;
          await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
          const img = new Image();
          img.src = cvs.toDataURL('image/jpeg', JPEG_QUALITY);
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
          cvs.width = cvs.height = 0;
          return img;
        };

        // ── Create all page divs (placeholder first) ─────────────────────
        const bookEl   = document.createElement('div');
        bookEl.id      = 'book';
        const pageDivs = [];

        for (let i = 0; i < total; i++) {
          const div = document.createElement('div');
          div.className  = 'page';
          div.style.cssText = `width:${pageW}px;height:${pageH}px;background:#f0ece0;display:flex;align-items:center;justify-content:center`;
          div.innerHTML = `<span style="color:#bbb;font-size:.85rem">Page ${i + 1}</span>`;
          bookEl.appendChild(div);
          pageDivs.push(div);
        }
        mount.appendChild(bookEl);

        // ── Render first N pages before showing the book ─────────────────
        const preload = Math.min(PRELOAD_PAGES, total);
        for (let i = 0; i < preload; i++) {
          loaderDetail.textContent = `Rendering page ${i + 1} of ${total}…`;
          progressBar.style.width = `${Math.round(((i + 1) / preload) * 100)}%`;
          pageDivs[i].innerHTML = '';
          pageDivs[i].appendChild(await renderToImg(i + 1));
        }

        // ── Init PageFlip ────────────────────────────────────────────────
        const pf = new St.PageFlip(bookEl, {
          width: pageW, height: pageH,
          showCover: true, usePortrait: isMobile,
          autoSize: false, drawShadow: true,
          flippingTime: 620, useMouseEvents: true,
          mobileScrollSupport: false, maxShadowOpacity: 0.45,
        });
        pf.loadFromHTML(bookEl.querySelectorAll('.page'));

        // Controls + cover-centering
        // StPageFlip draws the front cover on the right half of a 2×pageW canvas
        // and the back cover on the left half. Translate the mount so the visible
        // page is centred in the viewport instead of sitting off to one side.
        mount.style.transition = 'transform 0.35s ease';
        function syncView() {
          const cur = pf.getCurrentPageIndex();
          pageInfo.textContent = `${cur + 1} / ${total}`;
          prevBtn.disabled = cur === 0;
          nextBtn.disabled = cur >= total - 1;
          if (!isMobile) {
            if (cur === 0) {
              mount.style.transform = `translateX(-${Math.round(pageW / 2)}px)`;
            } else if (cur >= total - 1) {
              mount.style.transform = `translateX(${Math.round(pageW / 2)}px)`;
            } else {
              mount.style.transform = '';
            }
          }
        }
        prevBtn.addEventListener('click', () => pf.flipPrev('top'));
        nextBtn.addEventListener('click', () => pf.flipNext('top'));
        pf.on('flip', syncView);
        pf.on('changeState', syncView);

        // Show the book immediately
        loader.style.display = 'none';
        viewer.style.display = 'block';
        syncView();

        // ── Render remaining pages in the background ─────────────────────
        (async () => {
          let done = preload;
          for (let i = preload; i < total; i++) {
            pageDivs[i].innerHTML = '';
            pageDivs[i].appendChild(await renderToImg(i + 1));
            done++;
            const pct = Math.round((done / total) * 100);
            if (bgProgress) bgProgress.textContent = pct < 100 ? `Loading… ${pct}%` : '';
            await new Promise(r => setTimeout(r, 0)); // yield to UI
          }
        })();

      } catch (err) {
        console.error(err);
        loaderDetail.style.display = 'none';
        progressBar.parentElement.style.display = 'none';
        errorMsg.innerHTML =
          'Could not load the e-book. ' +
          '<a href="' + PDF_FILE + '" style="color:#fbbf24;text-decoration:underline" download>Download PDF instead</a>';
        errorMsg.style.display = 'block';
      }
    }

    initEbook();

    // ── i18n ─────────────────────────────────────────────────────────────
    const I18N_EB = {
      en: {
        "subnav.ebook":  "E-Book",
        "subnav.game":   "Game",
        "subnav.counter":"Mite Counter",
        "ebook.loading": "Loading e-book…",
        "ebook.prev":    "Previous",
        "ebook.next":    "Next",
        "ebook.hint":    "Click the edge of a page to flip · Swipe on mobile"
      },
      ko: {
        "subnav.ebook":  "전자책",
        "subnav.game":   "게임",
        "subnav.counter":"응애 카운터",
        "ebook.loading": "전자책 불러오는 중…",
        "ebook.prev":    "이전",
        "ebook.next":    "다음",
        "ebook.hint":    "페이지 끝을 클릭하여 넘기세요 · 모바일에서는 스와이프"
      }
    };
    function applyLang(lang) {
      const dict = I18N_EB[lang] || I18N_EB.en;
      document.querySelectorAll("[data-kor]").forEach(el => {
        const key = el.getAttribute("data-kor");
        if (dict[key]) el.innerHTML = dict[key];
      });
      document.documentElement.lang = lang;
      localStorage.setItem("lang", lang);
      const btn = document.getElementById("langToggle");
      if (btn) btn.textContent = lang === "en" ? "한국어" : "English";
    }
    (function(){
      const saved = localStorage.getItem("lang") || "en";
      applyLang(saved);
      const btn = document.getElementById("langToggle");
      if (btn) btn.addEventListener("click", () => {
        const next = (localStorage.getItem("lang") || "en") === "en" ? "ko" : "en";
        applyLang(next);
      });
    })();
    </script>
  </body>
</html>
